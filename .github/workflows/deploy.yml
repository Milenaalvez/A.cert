name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.171.216
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/acert
            git pull origin main
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npx tsc
            cd frontend
            npm install
            npx next build
            cd /var/www/acert
            pm2 restart acert-backend acert-frontend
