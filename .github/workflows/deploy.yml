name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.171.216
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/acert
            git pull origin main
            cd /var/www/acert/A.CERT
            echo "=== npm install ==="
            npm install
            echo "=== VNC setup (first run only) ==="
            if ! command -v x11vnc &>/dev/null; then
              echo "x11vnc nao encontrado, executando setup-vnc.sh..."
              bash scripts/setup-vnc.sh
            else
              echo "x11vnc ja instalado, pulando setup."
            fi
            echo "=== prisma ==="
            npx prisma generate
            npx prisma migrate deploy
            echo "=== tsc ==="
            npx tsc
            cd frontend
            echo "=== clean build ==="
            rm -rf .next node_modules
            npm install
            echo "=== next build ==="
            npx next build || { echo "BUILD FAILED"; exit 1; }
            echo "=== verify chunk ==="
            ls .next/static/chunks/app/page-*.js
            echo "=== pm2 restart ==="
            pm2 restart all
            pm2 status
            echo "=== VNC displays ==="
            for svc in xvfb x11vnc-99 x11vnc-100 x11vnc-101; do
              if systemctl is-active --quiet $svc; then
                echo "  $svc ✓"
              else
                echo "  $svc ✗ (iniciando...)"
                systemctl start $svc || echo "    Falha ao iniciar $svc"
              fi
            done
