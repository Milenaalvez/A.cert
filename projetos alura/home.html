<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>MAVIE - Início</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90' fill='%23A855F7' font-family='Poppins, sans-serif' font-weight='300'%3EM%3C/text%3E%3C/svg%3E">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar" id="navbar">

    <div class="navbar-logo">
        <span class="logo-m">M</span>
        <span class="logo-texto">MAVIE</span>
    </div>

    <nav class="navbar-menu" id="navbarMenu">
        <a href="#" class="nav-link ativo" data-categoria="inicio">Início</a>
        <a href="#" class="nav-link" data-categoria="popular">Populares</a>
        <a href="#" class="nav-link" data-categoria="top_rated">Mais avaliados</a>
        <a href="#" class="nav-link" data-categoria="upcoming">Em breve</a>
    </nav>

    <div class="navbar-acoes">

        <button class="btn-busca" id="abrirBusca" aria-label="Buscar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>

        <input type="text" id="pesquisa" class="pesquisa-input" placeholder="Buscar...">

        <div class="perfil-topo">
            <img id="perfilImg" alt="Perfil">
            <span id="perfilNome"></span>
        </div>

    </div>

    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

</header>

<!-- ================= USUÁRIO ================= -->
<section class="usuario-area">
</section>
<!-- ================= banner  ================= -->
<section id="banner">
    <div class="banner-conteudo">
        <h1 id="banner-titulo">Carregando...</h1>
        <p id="banner-desc"></p>

        <div class="banner-botoes">
            <button class="btn-play">▶ Assistir</button>
            <button class="btn-info">ℹ Mais info</button>
        </div>
    </div>
</section>

<!-- ================= CONTEÚDO ================= -->
<main>
    <div id="linhas">
        <!-- JS vai inserir os carrosséis aqui -->
    </div>
</main>

<!-- ================= MODAL (DETALHES DO FILME) ================= -->
<div class="modal" id="modal">
  <div class="modal-content">

    <span id="fechar">&times;</span>

    <img id="modal-img" src="">

    <div class="modal-info">
        <h2 id="modal-titulo"></h2>
        <p id="modal-desc"></p>

        <div class="modal-botoes">
            <button class="btn-play-modal">▶ Assistir</button>
            <button class="btn-fav">+ Favoritar</button>
        </div>
    </div>

    <div id="trailer-container" style="display:none;">
      <iframe id="trailer-video" width="100%" height="400" frameborder="0"></iframe>
    </div>


  </div>
</div>

<!-- ================= SCRIPT ================= -->
<footer class="rodape">
    <p>Memórias que são eternas.</p>
</footer>

<script src="home.js"></script>

</body>
</html>
